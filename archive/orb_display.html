<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samantha</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
  }

  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  #status-label {
    position: absolute;
    bottom: 12%;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.45);
    font-size: clamp(10px, 2vw, 14px);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    pointer-events: none;
    transition: opacity 0.8s ease, color 0.8s ease;
    opacity: 0;
    white-space: nowrap;
  }

  #status-label.visible { opacity: 1; }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="status-label"></div>

<script>
// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const CFG = {
  particleCount: 100,         // lower to ~120 on Pi Zero 2 W if laggy
  useAudioInput: false,        // set false to disable mic in browser
  wsUrl: 'ws://localhost:8765' // bridge WebSocket
};

// ─────────────────────────────────────────────
// STATE MACHINE
// ─────────────────────────────────────────────
const STATES = {
  idle:       { label: '',             color: [0.52, 0.80, 1.0],  pulse: 0.12, speed: 0.4,  glow: 0.3  },
  wake:       { label: 'Samantha',     color: [0.20, 1.0,  0.65], pulse: 0.35, speed: 1.2,  glow: 0.9  },
  listening:  { label: 'Listening…',   color: [0.15, 0.75, 1.0],  pulse: 0.50, speed: 1.6,  glow: 1.0  },
  thinking:   { label: 'Thinking…',    color: [0.85, 0.55, 1.0],  pulse: 0.25, speed: 2.5,  glow: 0.6  },
  speaking:   { label: 'Speaking',     color: [1.0,  0.75, 0.20], pulse: 0.55, speed: 1.8,  glow: 1.0  },
  error:      { label: 'Error',        color: [1.0,  0.25, 0.35], pulse: 0.20, speed: 0.6,  glow: 0.5  },
};

let currentState = 'idle';
let targetState  = 'idle';
let stateT = 1.0;

function setState(s) {
  if (!STATES[s]) return;
  if (s === targetState && stateT >= 1) return;
  targetState = s;
  stateT = 0;
  const lbl = document.getElementById('status-label');
  lbl.textContent = STATES[s].label;
  lbl.className = STATES[s].label ? 'visible' : '';
}

function lerp(a, b, t) { return a + (b - a) * t; }
function lerpColor(a, b, t) {
  return [lerp(a[0],b[0],t), lerp(a[1],b[1],t), lerp(a[2],b[2],t)];
}

// ─────────────────────────────────────────────
// CANVAS SETUP
// ─────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, CX, CY, R;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2; CY = H / 2;
  R  = Math.min(W, H) * 0.28;
}
resize();
window.addEventListener('resize', resize);

// ─────────────────────────────────────────────
// PARTICLES
// ─────────────────────────────────────────────
const particles = [];
for (let i = 0; i < CFG.particleCount; i++) particles.push(makeParticle(true));

function makeParticle(randomAge = false) {
  const angle = Math.random() * Math.PI * 2;
  const dist  = Math.random() * R * 0.95;
  return {
    orbitAngle: angle,
    orbitDist:  dist,
    orbitSpeed: (Math.random() - 0.5) * 0.008,
    life:       randomAge ? Math.random() : 0,
    maxLife:    1.5 + Math.random() * 3,
    size:       0.8 + Math.random() * 2.2,
  };
}

// ─────────────────────────────────────────────
// AUDIO
// ─────────────────────────────────────────────
let audioLevel = 0;
let analyser, dataArray;

async function initAudio() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.8;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    source.connect(analyser);
  } catch (e) {
    console.warn('Mic unavailable, using bridge audio level.', e);
    CFG.useAudioInput = false;
  }
}

function getBrowserAudioLevel() {
  if (!analyser) return 0;
  analyser.getByteTimeDomainData(dataArray);
  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    const v = (dataArray[i] - 128) / 128;
    sum += v * v;
  }
  return Math.min(1, Math.sqrt(sum / dataArray.length) * 3.5);
}

// ─────────────────────────────────────────────
// WEBSOCKET — receives state + audio from bridge
// ─────────────────────────────────────────────
let wsAudioLevel = 0;

function connectWS() {
  try {
    const ws = new WebSocket(CFG.wsUrl);
    ws.onopen  = () => console.log('Bridge connected');
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.state) setState(msg.state);
        if (typeof msg.audio_level === 'number') wsAudioLevel = msg.audio_level;
      } catch {}
    };
    ws.onclose = () => { console.log('Bridge disconnected, reconnecting…'); setTimeout(connectWS, 3000); };
    ws.onerror = () => {};
  } catch {}
}

// ─────────────────────────────────────────────
// RENDER LOOP
// ─────────────────────────────────────────────
let t = 0;

function getBlended(prop) {
  const a = STATES[currentState][prop];
  const b = STATES[targetState][prop];
  const ease = stateT < 1 ? 1 - Math.pow(1 - stateT, 3) : 1;
  return Array.isArray(a) ? lerpColor(a, b, ease) : lerp(a, b, ease);
}

function draw(timestamp) {
  requestAnimationFrame(draw);
  t = timestamp * 0.001;

  // Advance state blend
  if (stateT < 1) {
    stateT = Math.min(1, stateT + 0.016);
    if (stateT >= 1) currentState = targetState;
  }

  // Combine browser mic + bridge audio level
  const rawBrowser = CFG.useAudioInput ? getBrowserAudioLevel() : 0;
  const rawTarget  = Math.max(rawBrowser, wsAudioLevel);
  audioLevel = lerp(audioLevel, rawTarget, 0.2);

  const col   = getBlended('color');
  const pulse = getBlended('pulse');
  const speed = getBlended('speed');
  const glow  = getBlended('glow');

  const rgb = `${Math.round(col[0]*255)},${Math.round(col[1]*255)},${Math.round(col[2]*255)}`;

  const audioBoost = 1 + audioLevel * pulse * 2.5;
  const pulseMod   = 1 + Math.sin(t * speed * Math.PI * 2) * pulse * 0.5;
  const effR       = R * pulseMod * audioBoost;

  // ── Clear with fade trail ──
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(0, 0, W, H);

  const glowMag = glow * (1 + audioLevel * 0.8);

  // ── Outer glow layers ──
  for (let layer = 3; layer >= 0; layer--) {
    const layerR = effR * (1 + layer * 0.35);
    const alpha  = glowMag * (0.08 - layer * 0.016);
    const grad = ctx.createRadialGradient(CX, CY, 0, CX, CY, layerR);
    grad.addColorStop(0,   `rgba(${rgb},${Math.min(1, alpha * 3.5)})`);
    grad.addColorStop(0.4, `rgba(${rgb},${Math.min(1, alpha)})`);
    grad.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(CX, CY, layerR, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // ── Core orb ──
  const coreGrad = ctx.createRadialGradient(CX - effR*0.2, CY - effR*0.2, 0, CX, CY, effR);
  coreGrad.addColorStop(0,   `rgba(255,255,255,${0.55 * glowMag})`);
  coreGrad.addColorStop(0.3, `rgba(${rgb},${0.85 * glowMag})`);
  coreGrad.addColorStop(0.7, `rgba(${rgb},${0.45 * glowMag})`);
  coreGrad.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(CX, CY, effR, 0, Math.PI * 2);
  ctx.fillStyle = coreGrad;
  ctx.fill();

  // ── Swirl ring ──
  ctx.save();
  ctx.beginPath();
  ctx.arc(CX, CY, effR * 1.02, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(${rgb},${0.25 * glowMag})`;
  ctx.lineWidth = 1.5;
  ctx.shadowBlur = 20 * glowMag;
  ctx.shadowColor = `rgba(${rgb},0.8)`;
  ctx.stroke();
  ctx.restore();

  // ── Particles ──
  for (const p of particles) {
    p.life += 0.008 * speed;
    if (p.life >= p.maxLife) { Object.assign(p, makeParticle()); continue; }

    p.orbitAngle += p.orbitSpeed * speed;
    const swirlAngle = p.orbitAngle + t * speed * 0.15;
    const orbitPulse = p.orbitDist + Math.sin(t * speed + p.orbitAngle) * 12 * (1 + audioLevel);

    const px = CX + Math.cos(swirlAngle) * orbitPulse;
    const py = CY + Math.sin(swirlAngle) * orbitPulse;

    const dx = px - CX, dy = py - CY;
    if (dx*dx + dy*dy > (effR*1.3)*(effR*1.3)) continue;

    const alpha = Math.sin((p.life / p.maxLife) * Math.PI) * 0.7 * glowMag;
    const sz    = p.size * (1 + audioLevel * 1.5);

    ctx.beginPath();
    ctx.arc(px, py, sz, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${rgb},${alpha})`;
    ctx.fill();
  }

  // ── Specular highlight ──
  const hlX = CX - effR * 0.28, hlY = CY - effR * 0.28, hlR = effR * 0.45;
  const hl = ctx.createRadialGradient(hlX, hlY, 0, hlX, hlY, hlR);
  hl.addColorStop(0, `rgba(255,255,255,${0.25 * glowMag})`);
  hl.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.arc(hlX, hlY, hlR, 0, Math.PI * 2);
  ctx.fillStyle = hl;
  ctx.fill();
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
connectWS();

if (CFG.useAudioInput) {
  initAudio().then(() => requestAnimationFrame(draw));
} else {
  requestAnimationFrame(draw);
}

// Keyboard demo shortcuts (dev mode)
// i=idle  w=wake  l=listening  t=thinking  s=speaking  e=error
const keyMap = { i:'idle', w:'wake', l:'listening', t:'thinking', s:'speaking', e:'error' };
window.addEventListener('keydown', ev => {
  const s = keyMap[ev.key];
  if (s) { setState(s); currentState = s; stateT = 1; }
});

// URL param: ?state=listening
const urlState = new URLSearchParams(location.search).get('state');
if (urlState && STATES[urlState]) { setState(urlState); currentState = urlState; stateT = 1; }
</script>
</body>
</html>
